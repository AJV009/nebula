<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nebula</title>
    <meta
      name="description"
      content="Nebula is a template repository for @drupal-canvas/create with tooling, examples, and AI-assisted workflows for Drupal Canvas Code Components."
    />
    <style>
      :root {
        --bg-1: #f8fafc;
        --bg-2: #e2e8f0;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #475569;
        --brand: #0ea5e9;
        --brand-strong: #0284c7;
        --ring: rgba(14, 165, 233, 0.35);
        --shadow: 0 24px 60px -28px rgba(15, 23, 42, 0.45);
        --radius: 24px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family:
          "Avenir Next", "Segoe UI", "Helvetica Neue", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 15% 20%, #dbeafe 0%, transparent 35%),
          radial-gradient(circle at 80% 0%, #e0f2fe 0%, transparent 32%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        padding: 2rem;
      }

      .card {
        width: min(740px, 100%);
        background: color-mix(in srgb, var(--surface) 92%, #eff6ff 8%);
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .hero {
        padding: clamp(1.8rem, 2.8vw, 2.6rem);
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 0.45rem;
        border-radius: 999px;
        padding: 0.4rem 0.8rem;
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        color: #075985;
        background: rgba(125, 211, 252, 0.28);
      }

      .badge-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: var(--brand-strong);
        box-shadow: 0 0 0 6px rgba(14, 165, 233, 0.15);
      }

      h1 {
        margin: 1.15rem 0 0.8rem;
        font-size: clamp(1.8rem, 4.4vw, 2.8rem);
        line-height: 1.1;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: clamp(1rem, 2vw, 1.1rem);
        line-height: 1.6;
        max-width: 64ch;
      }

      .meta {
        margin-top: 1.7rem;
      }

      .meta-card {
        border-radius: 16px;
        background: linear-gradient(140deg, #f0f9ff, #e0f2fe);
        border: 1px solid rgba(14, 165, 233, 0.24);
        padding: 1rem;
      }

      .meta-label {
        display: block;
        font-size: 0.76rem;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #64748b;
      }

      .meta-value {
        display: block;
        margin-top: 0.35rem;
        font-size: 1rem;
        font-weight: 700;
        color: #0c4a6e;
      }

      .meta-command {
        margin-top: 0.75rem;
        display: inline-flex;
        align-items: center;
        padding: 0;
        background: transparent;
        border: 0;
        color: #0c4a6e;
        font-family: "SFMono-Regular", Menlo, Consolas, Monaco, monospace;
        font-size: 0.9rem;
        letter-spacing: 0.01em;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <section class="hero">
        <span class="badge">
          <span class="badge-dot" aria-hidden="true"></span>
          Template repository
        </span>

        <h1>Nebula</h1>
        <p>
          Nebula is a template repository for
          <code>@drupal-canvas/create</code> with tooling, examples, and
          AI-assisted workflows for Drupal Canvas Code Components.
        </p>

        <div class="meta">
          <article class="meta-card">
            <span class="meta-label">Getting started</span>
            <span class="meta-command">npx @drupal-canvas/create@latest</span>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
